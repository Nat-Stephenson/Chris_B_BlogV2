{{ define "main" }}
<h1 style="text-align:center; color:#00bfff; text-shadow:0 0 12px #00bfff,0 0 24px #000;">Jedi Archives: All Blog Posts</h1>
<div class="blog-card-list">
  {{ range .Pages }}
    <div class="blog-card">
      <a class="blog-card-title" href="{{ .RelPermalink }}">{{ .Title }}</a>
      <div class="blog-card-date">{{ .Date.Format "Jan 2, 2006" }}</div>
      {{ with .Params.description }}
        <div class="blog-card-desc">{{ . }}</div>
      {{ end }}
    </div>
  {{ end }}
</div>
{{ end }}
